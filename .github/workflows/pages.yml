name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Self-host a minified build so the embed snippet can load from our own
      # domain (ghost-toc-plugin.greedylabs.kr) instead of a third-party CDN.
      - name: Minify widget (toc.min.js)
        run: npx --yes terser toc.js --compress --mangle --output toc.min.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Publish the repo root: demo/configurator + toc.js + toc.css + toc.min.js
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
